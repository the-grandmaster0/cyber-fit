<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e22ce"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Octagon shape matching clip-path: polygon(0 20%,20% 0,80% 0,100% 20%,100% 80%,80% 100%,20% 100%,0 80%) -->
  <polygon
    points="0,6.4 6.4,0 25.6,0 32,6.4 32,25.6 25.6,32 6.4,32 0,25.6"
    fill="url(#bg)"
  />

  <!-- "CF" text centred -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="14"
    font-weight="900"
    letter-spacing="-0.5"
    fill="url(#text)"
  >CF</text>
</svg>
